<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Unsloth Fine-Tuning Skills</title>
  <desc id="desc">Modern SVG title banner for the Unsloth Fine-Tuning Skills project.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="40" x2="1460" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.5" stop-color="#111831"/>
      <stop offset="1" stop-color="#0A1327"/>
    </linearGradient>
    <linearGradient id="accent" x1="290" y1="80" x2="1210" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7F9"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="line" x1="260" y1="90" x2="1320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 90) rotate(41.6) scale(356 232)">
      <stop stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 330) rotate(138.7) scale(326 244)">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="white" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect x="20" y="20" width="1560" height="380" rx="34" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="380" rx="34" fill="url(#grid)"/>
  <rect x="20.75" y="20.75" width="1558.5" height="378.5" rx="33.25" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>

  <ellipse cx="320" cy="90" rx="340" ry="210" fill="url(#glowA)"/>
  <ellipse cx="1270" cy="330" rx="300" ry="230" fill="url(#glowB)"/>

  <g opacity="0.95">
    <path d="M147 134C230 95 277 89 356 112C446 138 499 117 578 88" stroke="url(#line)" stroke-width="6" stroke-linecap="round" filter="url(#softGlow)"/>
    <path d="M140 284C221 242 298 222 391 236C476 248 551 225 660 177" stroke="url(#line)" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>
    <circle cx="357" cy="112" r="8" fill="#7DD3FC"/>
    <circle cx="578" cy="88" r="8" fill="#34D399"/>
    <circle cx="391" cy="236" r="7" fill="#A78BFA"/>
    <circle cx="660" cy="177" r="7" fill="#7DD3FC"/>
  </g>

  <g>
    <rect x="122" y="92" width="148" height="36" rx="18" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12"/>
    <text x="196" y="115" fill="#D1FAE5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="2.4">LLM TOOLKIT</text>

    <rect x="288" y="92" width="182" height="36" rx="18" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12"/>
    <text x="379" y="115" fill="#E9D5FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="2.2">MODERN WORKFLOW</text>
  </g>

  <text x="118" y="208" fill="url(#accent)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-1.8">
    Unsloth Fine-Tuning Skills
  </text>

  <text x="121" y="260" fill="#E5EEF9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="500" opacity="0.92">
    Claude Code用のファインチューニングスキルスイート
  </text>

  <text x="121" y="304" fill="#9FB2C8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="400">
    PDF → Dataset → Training → Evaluation を一貫して扱う、洗練された学習パイプライン
  </text>

  <g opacity="0.82">
    <rect x="1180" y="90" width="285" height="208" rx="26" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <path d="M1221 225L1271 185L1324 201L1380 143L1427 172" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1271" cy="185" r="7" fill="#7DD3FC"/>
    <circle cx="1324" cy="201" r="7" fill="#A78BFA"/>
    <circle cx="1380" cy="143" r="7" fill="#34D399"/>
    <text x="1222" y="132" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Pipeline</text>
    <text x="1222" y="162" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Data • Train • Improve</text>
    <rect x="1222" y="244" width="72" height="28" rx="14" fill="#0EA5E9" fill-opacity="0.16"/>
    <text x="1258" y="262" fill="#BAE6FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">OPTUNA</text>
    <rect x="1304" y="244" width="78" height="28" rx="14" fill="#8B5CF6" fill-opacity="0.16"/>
    <text x="1343" y="262" fill="#E9D5FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">UNSLOTH</text>
    <rect x="1392" y="244" width="56" height="28" rx="14" fill="#22C55E" fill-opacity="0.16"/>
    <text x="1420" y="262" fill="#D1FAE5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">LLM</text>
  </g>
</svg>
